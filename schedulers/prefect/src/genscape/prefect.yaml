name: helioscta-python

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# Base tags: scheduled, natgas, genscape

deployments:

  # ── Daily Pipeline Production ───────────────────────────────────────────────

  - name: Genscape - Daily Pipeline Production - Scheduled
    entrypoint: backend/src/genscape/daily_pipeline_production.py:main
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, natgas, genscape]
    schedules:
      - cron: "0 12 * * *"
        timezone: "America/Edmonton"

  # ── Gas Production Forecast ─────────────────────────────────────────────────

  - name: Genscape - Gas Production Forecast - Scheduled
    entrypoint: backend/src/genscape/gas_production_forecast_v2_2025_09_23.py:main
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, natgas, genscape]
    schedules:
      - cron: "0 13 * * *"
        timezone: "America/Edmonton"

  # ── Daily Power Estimate ────────────────────────────────────────────────────

  - name: Genscape - Daily Power Estimate - Scheduled
    entrypoint: backend/src/genscape/daily_power_estimate.py:main
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, natgas, genscape]
    schedules:
      - cron: "0 12 * * *"
        timezone: "America/Edmonton"
