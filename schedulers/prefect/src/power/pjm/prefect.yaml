name: helioscta-python

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# Base tags: scheduled, power, pjm

deployments:

  # ── LMPs ────────────────────────────────────────────────────────────────────

  - name: PJM - DA Hourly LMPs - Scheduled
    entrypoint: backend/src/power/pjm/flows.py:da_hrl_lmps
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, pjm, lmp]
    schedules:
      - cron: "0 14-16 * * *"
        timezone: "America/Edmonton"

  - name: PJM - Rt Settlements Verified Hourly Lmps
    entrypoint: backend/src/power/pjm/flows.py:rt_settlements_verified_hourly_lmps
