    tags: [scheduled, power, ercot, wind-forecast]
    schedules:
      - cron: "0 4-22 * * *"
        timezone: "America/Edmonton"

  - name: ERCOT - Seven Day Wind Forecast By Region
    entrypoint: backend/src/power/ercot/flows.py:seven_day_wind_forecast_by_region
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, ercot, wind-forecast]
    schedules:
      - cron: "0 4-22 * * *"
        timezone: "America/Edmonton"

  # ── Energy Storage ─────────────────────────────────────────────────────────

  - name: ERCOT - Energy Storage Resources Daily
    entrypoint: backend/src/power/ercot/flows.py:energy_storage_resources_daily
