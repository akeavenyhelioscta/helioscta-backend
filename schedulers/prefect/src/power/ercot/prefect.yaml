name: helioscta-python

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# Base tags: scheduled, power, ercot

deployments:

  # ── Loads ───────────────────────────────────────────────────────────────────

  - name: ERCOT - Actual System Load
    entrypoint: backend/src/power/ercot/flows.py:actual_system_load
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, ercot, load]
    schedules:
      - cron: "0 4-22 * * *"
        timezone: "America/Edmonton"

  - name: ERCOT - Seven Day Load Forecast
    entrypoint: backend/src/power/ercot/flows.py:seven_day_load_forecast
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, ercot, load-forecast]
    schedules:
      - cron: "0 4-22 * * *"
        timezone: "America/Edmonton"

  # ── Pricing ────────────────────────────────────────────────────────────────

  - name: ERCOT - DAM Settlement Point Prices
    entrypoint: backend/src/power/ercot/flows.py:dam_stlmnt_pnt_prices
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, ercot, lmp]
    schedules:
      - cron: "0 14-16 * * *"
        timezone: "America/Edmonton"

  - name: ERCOT - Settlement Point Prices
    entrypoint: backend/src/power/ercot/flows.py:settlement_point_prices
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, ercot, lmp]
    schedules:
      - cron: "0 4-22 * * *"
        timezone: "America/Edmonton"

  # ── Solar Forecasts ────────────────────────────────────────────────────────

  - name: ERCOT - Seven Day Solar Forecast
    entrypoint: backend/src/power/ercot/flows.py:seven_day_solar_forecast
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, ercot, solar-forecast]
    schedules:
      - cron: "0 4-22 * * *"
        timezone: "America/Edmonton"

  - name: ERCOT - Seven Day Solar Forecast By Region
    entrypoint: backend/src/power/ercot/flows.py:seven_day_solar_forecast_by_region
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, ercot, solar-forecast]
    schedules:
      - cron: "0 4-22 * * *"
        timezone: "America/Edmonton"

  # ── Wind Forecasts ─────────────────────────────────────────────────────────

  - name: ERCOT - Seven Day Wind Forecast
    entrypoint: backend/src/power/ercot/flows.py:seven_day_wind_forecast
