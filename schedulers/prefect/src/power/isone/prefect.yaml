      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, isone, demand]
    schedules:
      - cron: "0 14-16 * * *"
        timezone: "America/Edmonton"

  - name: ISONE - Hourly System Demand
    entrypoint: backend/src/power/isone/flows.py:hourly_system_demand
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, isone, load]
    schedules:
      - cron: "0 4-22 * * *"
        timezone: "America/Edmonton"

  - name: ISONE - Three Day Reliability Region Demand Forecast
    entrypoint: backend/src/power/isone/flows.py:three_day_reliability_region_demand_forecast
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, isone, load-forecast]
    schedules:
      - cron: "0 4-22 * * *"
        timezone: "America/Edmonton"

  # ── Interchange ────────────────────────────────────────────────────────────

  - name: ISONE - RT Hourly Scheduled Interchange
    entrypoint: backend/src/power/isone/flows.py:rt_hrl_scheduled_interchange
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, isone, interchange]
    schedules:
      - cron: "0 4-22 * * *"
        timezone: "America/Edmonton"

  # ── Capacity Forecast ──────────────────────────────────────────────────────

  - name: ISONE - Seven Day Capacity Forecast
    entrypoint: backend/src/power/isone/flows.py:seven_day_capacity_forecast
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, isone, capacity-forecast]
    schedules:
      - cron: "0 4-22 * * *"
        timezone: "America/Edmonton"

  # ── Solar & Wind Forecasts ─────────────────────────────────────────────────

  - name: ISONE - Seven Day Solar Forecast
    entrypoint: backend/src/power/isone/flows.py:seven_day_solar_forecast
    work_pool:
