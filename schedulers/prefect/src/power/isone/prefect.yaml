name: helioscta-python

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# Base tags: scheduled, power, isone

deployments:

  # ── LMPs / Pricing ─────────────────────────────────────────────────────────

  - name: ISONE - DA Hourly LMPs
    entrypoint: backend/src/power/isone/flows.py:da_hrl_lmps
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, isone, lmp]
    schedules:
      - cron: "0 14-16 * * *"
        timezone: "America/Edmonton"

  - name: ISONE - RT Hourly LMPs Final
    entrypoint: backend/src/power/isone/flows.py:rt_hrl_lmps_final
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, isone, lmp]
    schedules:
      - cron: "0 4-22 * * *"
        timezone: "America/Edmonton"

  - name: ISONE - RT Hourly LMPs Prelim
    entrypoint: backend/src/power/isone/flows.py:rt_hrl_lmps_prelim
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, isone, lmp]
    schedules:
      - cron: "0 4-22 * * *"
        timezone: "America/Edmonton"

  # ── Loads / Demand ─────────────────────────────────────────────────────────

  - name: ISONE - DA Hourly Cleared Demand
    entrypoint: backend/src/power/isone/flows.py:da_hrl_cleared_demand
