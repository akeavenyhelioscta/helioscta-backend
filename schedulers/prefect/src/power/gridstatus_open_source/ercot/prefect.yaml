name: helioscta-python

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# Base tags: scheduled, power, ercot, gridstatus

deployments:

  # ── LMPs / Pricing ─────────────────────────────────────────────────────────

  - name: Gridstatus - ERCOT - Lmp By Settlement Point
    entrypoint: backend/src/power/gridstatus_open_source/ercot/flows.py:ercot_lmp_by_settlement_point
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, ercot, gridstatus, lmp]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  - name: Gridstatus - ERCOT - Spp Real Time 15 Min
    entrypoint: backend/src/power/gridstatus_open_source/ercot/flows.py:ercot_spp_real_time_15_min
