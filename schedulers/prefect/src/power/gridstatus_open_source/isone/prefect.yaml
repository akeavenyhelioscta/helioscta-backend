name: helioscta-python

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# Base tags: scheduled, power, isone, gridstatus

deployments:

  # ── Fuel Mix ────────────────────────────────────────────────────────────────

  - name: Gridstatus - ISONE - Fuel Mix
    entrypoint: backend/src/power/gridstatus_open_source/isone/flows.py:isone_fuel_mix
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, isone, gridstatus, fuel-mix]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"
