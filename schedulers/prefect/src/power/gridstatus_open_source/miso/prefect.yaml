name: helioscta-python

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# Base tags: scheduled, power, miso, gridstatus

deployments:

  # ── LMPs ────────────────────────────────────────────────────────────────────

  - name: Gridstatus - MISO - LMP Day Ahead Hourly
    entrypoint: backend/src/power/gridstatus_open_source/miso/flows.py:miso_lmp_day_ahead_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, miso, gridstatus, lmp]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  - name: Gridstatus - MISO - LMP Real Time 5 Min
    entrypoint: backend/src/power/gridstatus_open_source/miso/flows.py:miso_lmp_real_time_5_min
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, miso, gridstatus, lmp]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  # ── Loads ───────────────────────────────────────────────────────────────────

  - name: Gridstatus - MISO - Load
    entrypoint: backend/src/power/gridstatus_open_source/miso/flows.py:miso_load
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, miso, gridstatus, load]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  - name: Gridstatus - MISO - Load Forecast
    entrypoint: backend/src/power/gridstatus_open_source/miso/flows.py:miso_load_forecast
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, miso, gridstatus, load-forecast]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  # ── Fuel Mix ────────────────────────────────────────────────────────────────

  - name: Gridstatus - MISO - Fuel Mix
    entrypoint: backend/src/power/gridstatus_open_source/miso/flows.py:miso_fuel_mix
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, miso, gridstatus, fuel-mix]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  # ── Solar & Wind Forecasts ──────────────────────────────────────────────────

  - name: Gridstatus - MISO - Solar Forecast
    entrypoint: backend/src/power/gridstatus_open_source/miso/flows.py:miso_solar_forecast
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, miso, gridstatus, solar-forecast]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  - name: Gridstatus - MISO - Wind Forecast
    entrypoint: backend/src/power/gridstatus_open_source/miso/flows.py:miso_wind_forecast
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, miso, gridstatus, wind-forecast]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"
