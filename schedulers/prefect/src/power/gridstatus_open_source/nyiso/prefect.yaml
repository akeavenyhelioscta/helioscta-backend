name: helioscta-python

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# Base tags: scheduled, power, nyiso, gridstatus

deployments:

  # ── LMPs ────────────────────────────────────────────────────────────────────

  - name: Gridstatus - NYISO - LMP Day Ahead Hourly
    entrypoint: backend/src/power/gridstatus_open_source/nyiso/flows.py:nyiso_lmp_day_ahead_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, nyiso, gridstatus, lmp]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  - name: Gridstatus - NYISO - LMP Real Time 5 Min
    entrypoint: backend/src/power/gridstatus_open_source/nyiso/flows.py:nyiso_lmp_real_time_5_min
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, nyiso, gridstatus, lmp]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  # ── Loads ───────────────────────────────────────────────────────────────────

  - name: Gridstatus - NYISO - Load
    entrypoint: backend/src/power/gridstatus_open_source/nyiso/flows.py:nyiso_load
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, nyiso, gridstatus, load]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  - name: Gridstatus - NYISO - Load Forecast
    entrypoint: backend/src/power/gridstatus_open_source/nyiso/flows.py:nyiso_load_forecast
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, nyiso, gridstatus, load-forecast]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  # ── Fuel Mix ────────────────────────────────────────────────────────────────

  - name: Gridstatus - NYISO - Fuel Mix
    entrypoint: backend/src/power/gridstatus_open_source/nyiso/flows.py:nyiso_fuel_mix
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, nyiso, gridstatus, fuel-mix]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  # ── Solar Forecasts ─────────────────────────────────────────────────────────

  - name: Gridstatus - NYISO - BTM Solar Forecast
    entrypoint: backend/src/power/gridstatus_open_source/nyiso/flows.py:nyiso_btm_solar_forecast
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, nyiso, gridstatus, solar-forecast]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"
