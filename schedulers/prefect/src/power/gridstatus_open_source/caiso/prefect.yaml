name: helioscta-python

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# Base tags: scheduled, power, caiso, gridstatus

deployments:

  # ── LMPs ────────────────────────────────────────────────────────────────────

  - name: Gridstatus - CAISO - LMP Day Ahead Hourly
    entrypoint: backend/src/power/gridstatus_open_source/caiso/flows.py:caiso_lmp_day_ahead_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, caiso, gridstatus, lmp]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  - name: Gridstatus - CAISO - LMP Real Time 15 Min
    entrypoint: backend/src/power/gridstatus_open_source/caiso/flows.py:caiso_lmp_real_time_15_min
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, caiso, gridstatus, lmp]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  # ── Loads ───────────────────────────────────────────────────────────────────

  - name: Gridstatus - CAISO - Load Hourly
    entrypoint: backend/src/power/gridstatus_open_source/caiso/flows.py:caiso_load_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, caiso, gridstatus, load]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  - name: Gridstatus - CAISO - Load Forecast 7 Day
    entrypoint: backend/src/power/gridstatus_open_source/caiso/flows.py:caiso_load_forecast_7_day
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, caiso, gridstatus, load-forecast]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  # ── Fuel Mix ────────────────────────────────────────────────────────────────

  - name: Gridstatus - CAISO - Fuel Mix
    entrypoint: backend/src/power/gridstatus_open_source/caiso/flows.py:caiso_fuel_mix
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, caiso, gridstatus, fuel-mix]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"
