        timezone: "America/Edmonton"

  # ── Fuel Mix ────────────────────────────────────────────────────────────────

  - name: Gridstatus - PJM - Fuel Mix Hourly
    entrypoint: backend/src/power/gridstatus_open_source/pjm/flows.py:pjm_fuel_mix_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, pjm, gridstatus, fuel-mix]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  # ── Solar & Wind Forecasts ──────────────────────────────────────────────────

  - name: Gridstatus - PJM - Solar Forecast Hourly
