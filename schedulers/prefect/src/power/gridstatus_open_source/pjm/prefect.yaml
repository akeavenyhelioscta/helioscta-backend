name: helioscta-python

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# Base tags: scheduled, power, pjm, gridstatus

deployments:

  # ── LMPs ────────────────────────────────────────────────────────────────────

  - name: Gridstatus - PJM - DA Lmp
    entrypoint: backend/src/power/gridstatus_open_source/pjm/flows.py:pjm_da_lmp
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, pjm, gridstatus, lmp]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  - name: Gridstatus - PJM - RT Lmp
    entrypoint: backend/src/power/gridstatus_open_source/pjm/flows.py:pjm_rt_lmp
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, pjm, gridstatus, lmp]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  # ── Loads ───────────────────────────────────────────────────────────────────

  - name: Gridstatus - PJM - Load
