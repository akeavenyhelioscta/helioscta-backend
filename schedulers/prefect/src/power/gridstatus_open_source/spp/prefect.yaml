name: helioscta-python

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# Base tags: scheduled, power, spp, gridstatus

deployments:

  # ── LMPs ────────────────────────────────────────────────────────────────────

  - name: Gridstatus - SPP - LMP Day Ahead Hourly
    entrypoint: backend/src/power/gridstatus_open_source/spp/flows.py:spp_lmp_day_ahead_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, spp, gridstatus, lmp]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  - name: Gridstatus - SPP - LMP Real Time 5 Min
    entrypoint: backend/src/power/gridstatus_open_source/spp/flows.py:spp_lmp_real_time_5_min
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, spp, gridstatus, lmp]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  # ── Loads ───────────────────────────────────────────────────────────────────

  - name: Gridstatus - SPP - Hourly Load
    entrypoint: backend/src/power/gridstatus_open_source/spp/flows.py:spp_hourly_load
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, spp, gridstatus, load]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  - name: Gridstatus - SPP - Load Forecast
    entrypoint: backend/src/power/gridstatus_open_source/spp/flows.py:spp_load_forecast
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, spp, gridstatus, load-forecast]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  # ── Fuel Mix ────────────────────────────────────────────────────────────────

  - name: Gridstatus - SPP - Fuel Mix
    entrypoint: backend/src/power/gridstatus_open_source/spp/flows.py:spp_fuel_mix
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, spp, gridstatus, fuel-mix]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  # ── Solar & Wind Forecasts ──────────────────────────────────────────────────

  - name: Gridstatus - SPP - Solar And Wind Forecast
    entrypoint: backend/src/power/gridstatus_open_source/spp/flows.py:spp_solar_and_wind_forecast
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, spp, gridstatus, solar-forecast, wind-forecast]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"
