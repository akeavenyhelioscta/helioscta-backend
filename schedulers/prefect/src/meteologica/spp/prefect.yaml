name: helioscta-python

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# Base tags: scheduled, meteologica, spp

deployments:

  # ── Price Forecasts ─────────────────────────────────────────────────────────

  - name: Meteologica - SPP - DA Power Price North Hub Forecast Hourly
    entrypoint: backend/src/meteologica/spp/usa_spp_da_power_price_north_hub_forecast_hourly.py:main
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, meteologica, spp, price]
    schedules:
      - cron: "0 4-22 * * 1-7"
        timezone: "America/Edmonton"

  - name: Meteologica - SPP - DA Power Price South Hub Forecast Hourly
