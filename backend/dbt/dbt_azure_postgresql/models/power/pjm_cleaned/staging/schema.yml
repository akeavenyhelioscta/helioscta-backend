version: 2

models:

  # ===========================
  # LMPs
  # ===========================

  - name: staging_v1_pjm_lmps_hourly
    description: '{{ doc("pjm_lmps") }}'
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null
      - name: hub
        description: "Pricing hub name"
        tests:
          - not_null
      - name: market
        description: '{{ doc("col_market") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['da', 'rt', 'dart']
      - name: lmp_total
        description: "Total LMP ($/MWh)"
      - name: lmp_system_energy_price
        description: "System energy price component ($/MWh)"
      - name: lmp_congestion_price
        description: "Congestion price component ($/MWh)"
      - name: lmp_marginal_loss_price
        description: "Marginal loss price component ($/MWh)"

  - name: staging_v1_pjm_lmps_rt_hourly
    description: "Hourly real-time LMPs combining verified and unverified sources, preferring verified. Grain: date × hour_ending × hub."
    columns:
      - name: date
        tests:
          - not_null
      - name: hour_ending
        tests:
          - not_null
      - name: hub
        tests:
          - not_null
      - name: rt_lmp_total
        description: "Real-time total LMP ($/MWh)"
      - name: rt_lmp_system_energy_price
        description: "Real-time system energy price ($/MWh)"
      - name: rt_lmp_congestion_price
        description: "Real-time congestion price ($/MWh)"
      - name: rt_lmp_marginal_loss_price
        description: "Real-time marginal loss price ($/MWh)"

  - name: staging_v1_pjm_lmps_daily
    description: "Daily LMPs by hub, period, and market. Grain: date × hub × period × market."
    columns:
      - name: date
        tests:
          - not_null
      - name: hub
        tests:
          - not_null
      - name: period
        description: '{{ doc("col_period") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'onpeak', 'offpeak']
      - name: market
        tests:
          - not_null
          - accepted_values:
              values: ['da', 'rt', 'dart']
      - name: lmp_total
        description: "Average total LMP for the period ($/MWh)"

  # ===========================
  # Load — Day-Ahead
  # ===========================

  - name: staging_v1_pjm_load_da_hourly
    description: '{{ doc("pjm_load_da") }}'
    columns:
      - name: date
        tests:
          - not_null
      - name: hour_ending
        tests:
          - not_null
      - name: region
        description: '{{ doc("col_region") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['RTO', 'MIDATL', 'WEST', 'SOUTH']
      - name: da_load_mw
        description: "Day-ahead cleared load (MW)"

  - name: staging_v1_pjm_load_da_daily
    description: "Daily day-ahead load by region and period. Grain: date × region × period."
    columns:
      - name: date
        tests:
          - not_null
      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['RTO', 'MIDATL', 'WEST', 'SOUTH']
      - name: period
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'peak', 'onpeak', 'offpeak']
      - name: da_load
        description: "Day-ahead load aggregate for the period (MW)"

  # ===========================
  # Load — Real-Time
  # ===========================

  - name: staging_v1_pjm_load_rt_metered_hourly
    description: '{{ doc("pjm_load_rt") }}'
    columns:
      - name: date
        tests:
          - not_null
      - name: hour_ending
        tests:
          - not_null
      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['RTO', 'MIDATL', 'WEST', 'SOUTH']
      - name: rt_load_mw
        description: "Real-time metered load (MW)"

  - name: staging_v1_pjm_load_rt_metered_daily
    description: "Daily real-time metered load by region and period. Holiday-aware OnPeak/OffPeak. Grain: date × region × period."
    columns:
      - name: date
        tests:
          - not_null
      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['RTO', 'MIDATL', 'WEST', 'SOUTH']
      - name: period
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'peak', 'onpeak', 'offpeak']
      - name: rt_load_mw
        description: "Real-time metered load aggregate for the period (MW)"

  - name: staging_v1_pjm_load_rt_prelim_hourly
    description: "Hourly real-time preliminary load by region. Same-day with ~1 hour lag. Grain: date × hour_ending × region."
    columns:
      - name: date
        tests:
          - not_null
      - name: hour_ending
        tests:
          - not_null
      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['RTO', 'MIDATL', 'WEST', 'SOUTH']
      - name: rt_load_mw
        description: "Real-time preliminary load (MW)"

  - name: staging_v1_pjm_load_rt_prelim_daily
    description: "Daily real-time preliminary load by region and period. Holiday-aware OnPeak/OffPeak. Grain: date × region × period."
    columns:
      - name: date
        tests:
          - not_null
      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['RTO', 'MIDATL', 'WEST', 'SOUTH']
      - name: period
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'peak', 'onpeak', 'offpeak']
      - name: rt_load_mw
        description: "Real-time preliminary load aggregate for the period (MW)"

  - name: staging_v1_pjm_load_rt_instantaneous_hourly
    description: "Hourly real-time instantaneous load (5-min averaged to hourly) by region. Near real-time. Grain: date × hour_ending × region."
    columns:
      - name: date
        tests:
          - not_null
      - name: hour_ending
        tests:
          - not_null
      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['RTO', 'MIDATL', 'WEST', 'SOUTH']
      - name: rt_load_mw
        description: "Real-time instantaneous load, hourly average (MW)"

  # ===========================
  # Load — Forecast
  # ===========================

  - name: staging_v1_pjm_load_forecast_hourly
    description: '{{ doc("pjm_load_forecast") }}'
    columns:
      - name: forecast_rank
        description: '{{ doc("col_forecast_rank") }}'
        tests:
          - not_null
      - name: forecast_execution_datetime
        description: "When the forecast was issued"
        tests:
          - not_null
      - name: forecast_date
        description: "The date being forecasted"
        tests:
          - not_null
      - name: hour_ending
        tests:
          - not_null
      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['RTO', 'MIDATL', 'WEST', 'SOUTH']
      - name: forecast_load_mw
        description: "Forecasted load (MW)"

  - name: staging_v1_pjm_load_forecast_daily
    description: "PJM 7-day daily load forecast by region and period. Holiday-aware OnPeak/OffPeak. Grain: forecast_rank × forecast_date × region × period."
    columns:
      - name: forecast_rank
        tests:
          - not_null
      - name: forecast_date
        tests:
          - not_null
      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['RTO', 'MIDATL', 'WEST', 'SOUTH']
      - name: period
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'peak', 'onpeak', 'offpeak']
      - name: forecast_load_mw
        description: "Forecasted load aggregate for the period (MW)"

  - name: staging_v1_gridstatus_pjm_load_forecast_hourly
    description: "PJM 7-day hourly load forecast (from GridStatus). Complete forecasts only, ranked by recency. Grain: forecast_rank × forecast_date × hour_ending × region."
    columns:
      - name: forecast_rank
        tests:
          - not_null
      - name: forecast_date
        tests:
          - not_null
      - name: hour_ending
        tests:
          - not_null
      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['RTO', 'MIDATL', 'WEST', 'SOUTH']
      - name: forecast_load_mw
        description: "Forecasted load (MW)"

  # ===========================
  # Fuel Mix
  # ===========================

  - name: staging_v1_pjm_fuel_mix_hourly
    description: '{{ doc("pjm_fuel_mix") }}'
    columns:
      - name: date
        tests:
          - not_null
      - name: hour_ending
        tests:
          - not_null
      - name: total
        description: "Total generation (MW)"
      - name: thermal
        description: "Total thermal generation (MW)"
      - name: renewables
        description: "Total renewable generation (MW)"

  - name: staging_v1_pjm_fuel_mix_daily
    description: "PJM daily fuel mix generation by period. RTO-level only. Grain: date × period."
    columns:
      - name: date
        tests:
          - not_null
      - name: period
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'peak', 'onpeak', 'offpeak']

  # ===========================
  # Outages
  # ===========================

  - name: staging_v1_pjm_outages_actual_daily
    description: '{{ doc("pjm_outages") }}'
    columns:
      - name: date
        tests:
          - not_null
      - name: region
        tests:
          - not_null
      - name: total_outages_mw
        description: "Total outage MW"
      - name: planned_outages_mw
        description: "Planned outage MW"
      - name: maintenance_outages_mw
        description: "Maintenance outage MW"
      - name: forced_outages_mw
        description: "Forced outage MW"

  - name: staging_v1_pjm_outages_forecast_daily
    description: "PJM 7-day outage forecast by region, ranked by recency. Complete forecasts only. Grain: forecast_rank × forecast_execution_date × forecast_date × region."
    columns:
      - name: forecast_rank
        tests:
          - not_null
      - name: forecast_execution_date
        tests:
          - not_null
      - name: forecast_date
        tests:
          - not_null
      - name: region
        tests:
          - not_null
      - name: total_outages_mw
        description: "Total forecasted outage MW"

  # ===========================
  # Tie Flows
  # ===========================

  - name: staging_v1_pjm_tie_flows_hourly
    description: '{{ doc("pjm_tie_flows") }}'
    columns:
      - name: date
        tests:
          - not_null
      - name: hour_ending
        tests:
          - not_null
      - name: tie_flow_name
        description: "Interface/tie flow name"
        tests:
          - not_null
      - name: actual_mw
        description: "Actual tie flow (MW)"
      - name: scheduled_mw
        description: "Scheduled tie flow (MW)"

  - name: staging_v1_pjm_tie_flows_daily
    description: "PJM daily tie flows by interface and period. Grain: date × tie_flow_name × period."
    columns:
      - name: date
        tests:
          - not_null
      - name: tie_flow_name
        tests:
          - not_null
      - name: period
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'onpeak', 'offpeak']
      - name: actual_mw
        description: "Average actual tie flow for the period (MW)"
      - name: scheduled_mw
        description: "Average scheduled tie flow for the period (MW)"

  # ===========================
  # Solar & Wind Forecasts
  # ===========================

  - name: staging_v1_pjm_solar_forecast_hourly
    description: '{{ doc("pjm_solar_wind_forecast") }}'
    columns:
      - name: forecast_rank
        tests:
          - not_null
      - name: forecast_date
        tests:
          - not_null
      - name: hour_ending
        tests:
          - not_null
      - name: solar_forecast
        description: "Front-of-meter solar forecast (MW)"
      - name: solar_forecast_btm
        description: "Behind-the-meter solar forecast (MW)"

  - name: staging_v1_pjm_wind_forecast_hourly
    description: "PJM 2-day hourly wind generation forecast. Complete forecasts only, ranked by recency. Grain: forecast_rank × forecast_date × hour_ending."
    columns:
      - name: forecast_rank
        tests:
          - not_null
      - name: forecast_date
        tests:
          - not_null
      - name: hour_ending
        tests:
          - not_null
      - name: wind_forecast
        description: "Wind generation forecast (MW)"
