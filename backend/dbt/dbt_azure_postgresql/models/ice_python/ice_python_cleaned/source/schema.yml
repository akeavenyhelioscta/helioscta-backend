version: 2

models:
  - name: source_v1_ice_balmo
    description: >
      Raw ICE balance-of-month (BALMO) gas swap prices pivoted by hub.
      Joins ICE raw data with gas day dates and pivots 15 hub symbols into
      individual columns. Grain: one row per trade_date.
    columns:
      - name: date
        description: '{{ doc("ice_python_col_date") }}'
        tests:
          - not_null
      - name: gas_day
        description: '{{ doc("ice_python_col_gas_day") }}'
      - name: trade_date
        description: '{{ doc("ice_python_col_trade_date") }}'
        tests:
          - not_null
      - name: hh_balmo
        description: '{{ doc("ice_python_col_hh_balmo") }}'
      - name: transco_st85_balmo
        description: "Transco Station 85 BALMO settle price ($/MMBtu)."
      - name: pine_prarie_balmo
        description: "Pine Prairie BALMO settle price ($/MMBtu)."
      - name: houston_ship_channel_balmo
        description: "Houston Ship Channel BALMO settle price ($/MMBtu)."
      - name: waha_balmo
        description: "Waha BALMO settle price ($/MMBtu)."
      - name: ngpl_txok_balmo
        description: "NGPL TX/OK BALMO settle price ($/MMBtu)."
      - name: transco_zone_5_south_balmo
        description: "Transco Zone 5 South BALMO settle price ($/MMBtu)."
      - name: tetco_m3_balmo
        description: "Tetco M3 BALMO settle price ($/MMBtu)."
      - name: agt_balmo
        description: "AGT (Algonquin Gas Transmission) BALMO settle price ($/MMBtu)."
      - name: iroquois_z2_balmo
        description: "Iroquois Zone 2 BALMO settle price ($/MMBtu)."
      - name: socal_cg_balmo
        description: "SoCal Citygate BALMO settle price ($/MMBtu)."
      - name: pge_cg_balmo
        description: "PG&E Citygate BALMO settle price ($/MMBtu)."
      - name: cig_balmo
        description: "CIG (Colorado Interstate Gas) BALMO settle price ($/MMBtu)."
      - name: ngpl_midcon_balmo
        description: "NGPL Midcontinent BALMO settle price ($/MMBtu)."
      - name: michcon_balmo
        description: "MichCon BALMO settle price ($/MMBtu)."

  - name: source_v1_ice_next_day_gas_hourly
    description: >
      Raw ICE next-day firm physical gas prices pivoted by hub.
      Joins hourly dates with ICE raw data and pivots 15 hub symbols into
      individual columns. Grain: one row per datetime (date x hour_ending).
    columns:
      - name: datetime
        description: '{{ doc("ice_python_col_datetime") }}'
        tests:
          - not_null
      - name: date
        description: '{{ doc("ice_python_col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("ice_python_col_hour_ending") }}'
        tests:
          - not_null
      - name: gas_day
        description: '{{ doc("ice_python_col_gas_day") }}'
      - name: trade_date
        description: '{{ doc("ice_python_col_trade_date") }}'
        tests:
          - not_null
      - name: hh_cash
        description: '{{ doc("ice_python_col_hh_cash") }}'
      - name: transco_st85_cash
        description: "Transco Station 85 next-day cash price ($/MMBtu)."
      - name: pine_prarie_cash
        description: "Pine Prairie next-day cash price ($/MMBtu)."
      - name: waha_cash
        description: "Waha next-day cash price ($/MMBtu)."
      - name: houston_ship_channel_cash
        description: "Houston Ship Channel next-day cash price ($/MMBtu)."
      - name: ngpl_txok_cash
        description: "NGPL TX/OK next-day cash price ($/MMBtu)."
      - name: transco_zone_5_south_cash
        description: "Transco Zone 5 South next-day cash price ($/MMBtu)."
      - name: tetco_m3_cash
        description: "Tetco M3 next-day cash price ($/MMBtu)."
      - name: agt_cash
        description: "AGT next-day cash price ($/MMBtu)."
      - name: iroquois_z2_cash
        description: "Iroquois Zone 2 next-day cash price ($/MMBtu)."
      - name: socal_cg_cash
        description: "SoCal Citygate next-day cash price ($/MMBtu)."
      - name: pge_cg_cash
        description: "PG&E Citygate next-day cash price ($/MMBtu)."
      - name: cig_cash
        description: "CIG next-day cash price ($/MMBtu)."
      - name: ngpl_midcon_cash
        description: "NGPL Midcontinent next-day cash price ($/MMBtu)."
      - name: michcon_cash
        description: "MichCon next-day cash price ($/MMBtu)."
