version: 2

models:
  - name: source_v1_daily_observed_wdd
    description: >
      Unpivots the raw daily_observed_wdd table from wide format (regions as columns,
      data_type as rows) into long format (region as a row dimension, data types as columns).
      Grain: date x region.
    columns:
      - name: date
        description: 'Observation date.'
        tests:
          - not_null
      - name: region
        description: 'WSI North America gas region.'
        tests:
          - not_null
          - accepted_values:
              values:
                - 'EAST'
                - 'MIDWEST'
                - 'MOUNTAIN'
                - 'PACIFIC'
                - 'SOUTHCENTRAL'
                - 'CONUS'
                - 'GASPRODUCING'
                - 'GASCONSEAST'
                - 'GASCONSWEST'
      - name: electric_cdd
        description: 'Electric-weighted cooling degree days.'
      - name: electric_hdd
        description: 'Electric-weighted heating degree days.'
      - name: gas_cdd
        description: 'Gas-weighted cooling degree days.'
      - name: gas_hdd
        description: 'Gas-weighted heating degree days.'
      - name: oil_cdd
        description: 'Oil-weighted cooling degree days.'
      - name: oil_hdd
        description: 'Oil-weighted heating degree days.'
      - name: population_cdd
        description: 'Population-weighted cooling degree days.'
      - name: population_hdd
        description: 'Population-weighted heating degree days.'

  - name: source_v1_daily_forecast_wdd
    description: >
      UNION ALL of all per-model WDD forecast tables (WSI, GFS_OP, GFS_ENS,
      ECMWF_OP, ECMWF_ENS). Selects and casts all degree-day columns,
      derives cycle from init_time hour, and applies a 365-day lookback and region filter.
      Grain: forecast_execution_datetime x forecast_date x model x cycle x bias_corrected x region.
    columns:
      - name: forecast_execution_datetime
        description: 'Forecast model initialization timestamp.'
        tests:
          - not_null
      - name: forecast_execution_date
        description: 'Forecast initialization date (derived from forecast_execution_datetime).'
        tests:
          - not_null
      - name: forecast_date
        description: 'Target forecast date.'
        tests:
          - not_null
      - name: model
        description: 'Forecast model name (WSI, GFS_OP, GFS_ENS, ECMWF_OP, ECMWF_ENS).'
        tests:
          - not_null
      - name: cycle
        description: 'Model cycle (e.g. 00Z, 12Z). NULL for WSI blend.'
      - name: bias_corrected
        description: 'Whether the forecast is bias-corrected.'
        tests:
          - not_null
      - name: region
        description: 'WSI North America gas region.'
        tests:
          - not_null
          - accepted_values:
              values:
                - 'CONUS'
                - 'EAST'
                - 'MIDWEST'
                - 'MOUNTAIN'
                - 'PACIFIC'
                - 'SOUTHCENTRAL'
      - name: electric_cdd
        description: 'Electric-weighted cooling degree days.'
      - name: electric_hdd
        description: 'Electric-weighted heating degree days.'
      - name: gas_cdd
        description: 'Gas-weighted cooling degree days.'
      - name: gas_hdd
        description: 'Gas-weighted heating degree days.'
      - name: pw_cdd
        description: 'Population-weighted cooling degree days (aliased from population_cdd).'
      - name: pw_hdd
        description: 'Population-weighted heating degree days (aliased from population_hdd).'

  - name: source_v1_hourly_forecast_temp
    description: >
      Selects and casts all columns from the raw hourly_forecast_temp_v4_2025_jan_12 table.
      Aliases abbreviated raw column names to clean snake_case. One row per
      local_time x region x site_id x station_name with forecast weather fields.
      Grain: local_time x region x site_id x station_name.
    columns:
      - name: local_time
        description: 'Forecast target timestamp in local prevailing timezone.'
        tests:
          - not_null
      - name: region
        description: 'WSI geographic region grouping for the weather station.'
        tests:
          - not_null
      - name: site_id
        description: 'WSI unique weather station identifier.'
        tests:
          - not_null
      - name: station_name
        description: 'Human-readable weather station name.'
        tests:
          - not_null
      - name: temperature
        description: 'Forecast temperature (°F).'
      - name: temperature_diff
        description: 'Forecast temperature difference from normal (°F).'
      - name: temperature_normal
        description: 'Normal temperature for the forecasted hour (°F).'
      - name: dewpoint
        description: 'Forecast dewpoint temperature (°F).'
      - name: cloud_cover_pct
        description: 'Forecast cloud cover percentage.'
      - name: feels_like_temperature
        description: 'Forecast feels-like temperature (°F).'
      - name: feels_like_temperature_diff
        description: 'Forecast feels-like temperature difference from normal (°F).'
      - name: precipitation
        description: 'Forecast precipitation amount.'
      - name: wind_direction
        description: 'Forecast wind direction in degrees (0–360).'
      - name: wind_speed
        description: 'Forecast wind speed (mph).'
      - name: ghi_irradiance
        description: 'Forecast global horizontal irradiance.'
      - name: created_at
        description: 'Row creation timestamp from ingestion pipeline.'
      - name: updated_at
        description: 'Row last-updated timestamp from ingestion pipeline.'

  - name: source_v1_hourly_observed_temp
    description: >
      Selects and casts all columns from the raw hourly_observed_temp_v2_20250722 table.
      One row per date x hour x region x site_id x station_name with weather measurements.
      Grain: date x hour x region x site_id x station_name.
    columns:
      - name: date
        description: 'Observation date.'
        tests:
          - not_null
      - name: hour_ending
        description: 'Observation hour ending (0–23).'
        tests:
          - not_null
      - name: region
        description: 'WSI geographic region grouping for the weather station.'
        tests:
          - not_null
      - name: site_id
        description: 'WSI unique weather station identifier.'
        tests:
          - not_null
      - name: station_name
        description: 'Human-readable weather station name.'
        tests:
          - not_null
      - name: temperature
        description: 'Observed temperature (°F).'
      - name: dewpoint
        description: 'Observed dewpoint temperature (°F).'
      - name: cloud_cover_pct
        description: 'Observed cloud cover percentage (0–100).'
      - name: wind_direction
        description: 'Observed wind direction in degrees (0–360).'
      - name: wind_speed
        description: 'Observed wind speed (mph).'
      - name: heat_index
        description: 'Computed heat index (°F).'
      - name: wind_chill
        description: 'Computed wind chill (°F).'
      - name: relative_humidity
        description: 'Observed relative humidity percentage.'
      - name: precipitation
        description: 'Observed precipitation amount.'
