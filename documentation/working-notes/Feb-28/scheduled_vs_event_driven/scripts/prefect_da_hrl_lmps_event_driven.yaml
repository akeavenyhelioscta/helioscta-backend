name: helioscta-python

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # PJM
  - name: PJM - DA Hourly LMPs - Event Driven
    entrypoint: helioscta_api_scrapes/src/cloud/power/iso/pjm/event_driven/da_hrl_lmps.py:main
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags:
      - power
      - pjm
      - lmp
      - event-driven
    schedules:
      - cron: "0 10 * * *"
        timezone: "America/Edmonton"