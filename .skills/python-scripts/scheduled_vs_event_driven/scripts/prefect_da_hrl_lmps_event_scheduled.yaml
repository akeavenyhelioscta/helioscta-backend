name: helioscta-python

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# Base tags: scheduled, power, pjm

deployments:

  # ── LMPs ────────────────────────────────────────────────────────────────────

  - name: PJM - DA Hourly LMPs - Scheduled
    entrypoint: helioscta_api_scrapes/src/cloud/power/iso/pjm/scheduled/da_hrl_lmps.py:main
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [scheduled, power, pjm, lmp]
    schedules:
      - cron: "0 14-16 * * *"
        timezone: "America/Edmonton"