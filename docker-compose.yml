version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 5s
      timeout: 5s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    ports:
      - "4321:4321"
    environment:
    - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
    - PREFECT_SERVER_API_PORT=4321
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4321/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 30

  prefect-worker:
    build:
      context: .
      dockerfile: Dockerfile.prefect
    command:
      - bash
      - -c
      - |
        prefect work-pool create default-agent-pool --type process || true
        find /app/helioscta_api_scrapes -name 'prefect.yaml' -exec prefect deploy --all --prefect-file {} \;
        prefect worker start --pool default-agent-pool --work-queue default
    environment:
      - PREFECT_API_URL=http://prefect-server:4321/api
    depends_on:
      prefect-server:
        condition: service_healthy

volumes:
  postgres-data:
  dbt-logs: